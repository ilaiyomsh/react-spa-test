<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - React SPA Test</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #e0e0e0;
        }
        .app-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 32px;
            font-size: 0.9rem;
        }
        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }
        .input-row input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #444;
            background: rgba(255,255,255,0.07);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-row input:focus { border-color: #a78bfa; }
        .input-row input::placeholder { color: #666; }
        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-add {
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            color: #fff;
        }
        .btn-add:hover { transform: scale(1.05); }
        .btn-add:disabled { opacity: 0.4; cursor: default; transform: none; }
        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .filter-btn {
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid #444;
            background: transparent;
            color: #aaa;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .filter-btn.active {
            background: rgba(167, 139, 250, 0.2);
            border-color: #a78bfa;
            color: #a78bfa;
        }
        .task-list { list-style: none; }
        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .task-item:hover { background: rgba(255,255,255,0.08); }
        .task-item.done .task-text {
            text-decoration: line-through;
            color: #666;
        }
        .checkbox {
            width: 22px; height: 22px;
            border-radius: 50%;
            border: 2px solid #555;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .checkbox.checked {
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            border-color: transparent;
        }
        .checkbox.checked::after { content: '✓'; color: #fff; font-size: 14px; }
        .task-text { flex: 1; font-size: 1rem; }
        .btn-delete {
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px 8px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .btn-delete:hover { color: #ef4444; background: rgba(239,68,68,0.1); }
        .stats {
            text-align: center;
            color: #666;
            margin-top: 24px;
            font-size: 0.85rem;
        }
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: #555;
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
        .page { display: none; }
        .page.active { display: block; }
        nav {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 32px;
        }
        nav a {
            color: #888;
            text-decoration: none;
            padding: 8px 0;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }
        nav a.active { color: #a78bfa; border-bottom-color: #a78bfa; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function TaskPage({ tasks, setTasks }) {
            const [input, setInput] = useState('');
            const [filter, setFilter] = useState('all');

            const addTask = () => {
                if (!input.trim()) return;
                setTasks(prev => [...prev, { id: Date.now(), text: input.trim(), done: false }]);
                setInput('');
            };

            const toggle = (id) => {
                setTasks(prev => prev.map(t => t.id === id ? { ...t, done: !t.done } : t));
            };

            const remove = (id) => {
                setTasks(prev => prev.filter(t => t.id !== id));
            };

            const filtered = useMemo(() => {
                if (filter === 'active') return tasks.filter(t => !t.done);
                if (filter === 'done') return tasks.filter(t => t.done);
                return tasks;
            }, [tasks, filter]);

            const doneCount = tasks.filter(t => t.done).length;

            return (
                <div>
                    <div className="input-row">
                        <input
                            value={input}
                            onChange={e => setInput(e.target.value)}
                            onKeyDown={e => e.key === 'Enter' && addTask()}
                            placeholder="הוסף משימה חדשה..."
                        />
                        <button className="btn btn-add" onClick={addTask} disabled={!input.trim()}>
                            הוסף
                        </button>
                    </div>

                    <div className="filters">
                        {['all', 'active', 'done'].map(f => (
                            <button
                                key={f}
                                className={`filter-btn ${filter === f ? 'active' : ''}`}
                                onClick={() => setFilter(f)}
                            >
                                {f === 'all' ? 'הכל' : f === 'active' ? 'פעילות' : 'הושלמו'}
                            </button>
                        ))}
                    </div>

                    {filtered.length === 0 ? (
                        <div className="empty-state">
                            <div className="icon">{filter === 'done' ? '🎯' : '📝'}</div>
                            <p>{filter === 'done' ? 'אין משימות שהושלמו' : 'אין משימות — הוסף אחת!'}</p>
                        </div>
                    ) : (
                        <ul className="task-list">
                            {filtered.map(task => (
                                <li key={task.id} className={`task-item ${task.done ? 'done' : ''}`}>
                                    <div
                                        className={`checkbox ${task.done ? 'checked' : ''}`}
                                        onClick={() => toggle(task.id)}
                                    />
                                    <span className="task-text">{task.text}</span>
                                    <button className="btn-delete" onClick={() => remove(task.id)}>×</button>
                                </li>
                            ))}
                        </ul>
                    )}

                    {tasks.length > 0 && (
                        <div className="stats">
                            {doneCount} מתוך {tasks.length} משימות הושלמו
                        </div>
                    )}
                </div>
            );
        }

        function AboutPage() {
            return (
                <div style={{ textAlign: 'center', padding: '40px 20px', color: '#aaa' }}>
                    <h2 style={{ marginBottom: 16, color: '#a78bfa' }}>אודות</h2>
                    <p style={{ marginBottom: 12 }}>אפליקציית ניהול משימות בנויה ב-React</p>
                    <p style={{ marginBottom: 12 }}>נפרסה באמצעות GitHub Pages Deploy Skill</p>
                    <p style={{ fontSize: '0.85rem', color: '#666' }}>גרסה 1.0 • מרץ 2026</p>
                </div>
            );
        }

        function App() {
            const [page, setPage] = useState('tasks');
            const [tasks, setTasks] = useState([
                { id: 1, text: 'לבדוק שהאתר עובד', done: false },
                { id: 2, text: 'לנווט בין דפים', done: false },
                { id: 3, text: 'להוסיף משימה חדשה', done: false },
            ]);

            // Simple hash-based routing
            useEffect(() => {
                const onHash = () => {
                    const hash = window.location.hash.slice(1) || 'tasks';
                    setPage(hash);
                };
                window.addEventListener('hashchange', onHash);
                onHash();
                return () => window.removeEventListener('hashchange', onHash);
            }, []);

            return (
                <div className="app-container">
                    <h1>Task Manager</h1>
                    <p className="subtitle">React SPA • GitHub Pages Test</p>

                    <nav>
                        <a className={page === 'tasks' ? 'active' : ''} onClick={() => window.location.hash = 'tasks'}>
                            משימות
                        </a>
                        <a className={page === 'about' ? 'active' : ''} onClick={() => window.location.hash = 'about'}>
                            אודות
                        </a>
                    </nav>

                    {page === 'tasks' ? (
                        <TaskPage tasks={tasks} setTasks={setTasks} />
                    ) : (
                        <AboutPage />
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
